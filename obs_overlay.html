<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OBS Overlay - ハムハム字幕アトリエ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Huninn&display=swap" rel="stylesheet">
  <style>
    :root {
      --text-align: center;
    }

    body {
      margin: 0;
      padding: 10px 20px;
      background-color: transparent;
      font-family: "Huninn", Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: var(--text-align);
      justify-content: flex-start; /* 將文字靠頂部對齊 */
      height: 100vh;
      box-sizing: border-box;
      overflow: hidden;
    }

    .subtitle-container {
      display: flex;
      flex-direction: column;
      align-items: var(--text-align);
      text-align: var(--text-align);
      gap: 6px;
      width: 100%;
      padding-top: 10px;
    }

    .text-line {
      font-weight: bold;
      line-height: 1.3em;
      paint-order: stroke fill;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
      /* 單次淡入動畫 */
      animation: fadeIn 0.2s ease-out forwards;
      flex-shrink: 0;
    }

    .text-line:empty {
      display: none;
    }

    /* =========================================
       Overflow & Logic
       ========================================= */
    .overflow-normal { overflow: visible; }

    .overflow-truncate {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      text-overflow: ellipsis;
      line-clamp: 1;
      -webkit-line-clamp: 1;
      overflow: hidden;
    }

    .overflow-shrink {
      display: block;
      height: 1.3em;
      overflow-y: hidden;
      white-space: pre-wrap;
      word-wrap: break-word;
      scroll-behavior: auto;
    }

    .visual-single-line {
      display: block !important;
      height: 1.3em !important;
      justify-content: flex-start !important;
      overflow: hidden !important;
      white-space: normal !important;
      scroll-behavior: smooth;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="subtitle-container" id="subtitle-container">
    <div id="source-text" class="text-line source-text"></div>
    <div id="target-text-1" class="text-line"></div>
    <div id="target-text-2" class="text-line"></div>
    <div id="target-text-3" class="text-line"></div>
  </div>

  <script>
    const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));
    const urlParams = new URLSearchParams(window.location.search);
    const wsUrl = hashParams.get('url') || urlParams.get('url') || 'ws://127.0.0.1:4455';
    const wsPwd = hashParams.get('pwd') || urlParams.get('pwd') || '';

    // Mode-based element visibility (single file replaces 5 separate overlay HTMLs)
    const mode = hashParams.get('mode') || urlParams.get('mode') || 'all';
    const hideMap = {
      source:  '#target-text-1,#target-text-2,#target-text-3',
      target1: '#source-text,#target-text-2,#target-text-3',
      target2: '#source-text,#target-text-1,#target-text-3',
      target3: '#source-text,#target-text-1,#target-text-2'
    };
    if (hideMap[mode]) {
      const s = document.createElement('style');
      s.textContent = hideMap[mode] + '{display:none!important}';
      document.head.appendChild(s);
    }

    const sourceEl = document.getElementById('source-text');
    const target1El = document.getElementById('target-text-1');
    const target2El = document.getElementById('target-text-2');
    const target3El = document.getElementById('target-text-3');

    // Utils
    function toBase64(bytes) {
      let binary = '';
      for (let i = 0; i < bytes.length; i++) {
        binary += String.fromCharCode(bytes[i]);
      }
      return btoa(binary);
    }

    async function sha256Base64(text) {
      try {
        const data = new TextEncoder().encode(text);
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        return toBase64(new Uint8Array(hashBuffer));
      } catch (err) {
        console.error("Crypto API error:", err);
        sourceEl.textContent = "Crypto API Error: " + err.message;
        applyStyle(sourceEl, { color: "#ff0000", strokeColor: "#000000", strokeSize: "2px", fontSize: "24px" });
        throw err;
      }
    }

    async function buildAuthToken(password, salt, challenge) {
      if (!password || !salt || !challenge) return '';
      const secret = await sha256Base64(password + salt);
      return sha256Base64(secret + challenge);
    }

    // Scrolling Logic
    const smoothScrollToSlowly = (element, to, duration) => {
      const start = element.scrollTop;
      const change = to - start;
      const startTime = performance.now();

      const animateScroll = (currentTime) => {
        const elapsed = currentTime - startTime;
        const t = Math.min(1, elapsed / duration);
        const easeOut = t * (2 - t);

        element.scrollTop = start + (change * easeOut);

        if (elapsed < duration) { requestAnimationFrame(animateScroll); }
      };

      requestAnimationFrame(animateScroll);
    };

    const setupSourceScrollBehavior = (el) => {
      if (!el) return;
      const observer = new MutationObserver(() => {
        if (el.scrollHeight > el.clientHeight) {
          el.scrollTo({ top: el.scrollHeight, behavior: 'smooth' });
        } else {
          el.scrollTop = 0;
        }
      });
      observer.observe(el, { childList: true, characterData: true, subtree: true });
    };

    const setupTargetScrollBehavior = (el) => {
      if (!el) return;
      let activeScrollSession = null;

      const startSmartScrolling = () => {
        const isShrink = el.classList.contains('overflow-shrink');
        const isTruncate = el.classList.contains('overflow-truncate');
        
        if (isTruncate) return;
        
        if (isShrink) {
          const style = window.getComputedStyle(el);
          const lineHeight = parseFloat(style.lineHeight) || (parseFloat(style.fontSize) * 1.3);
          const currentScroll = el.scrollTop;
          const maxScroll = el.scrollHeight - el.clientHeight;
          
          if (currentScroll < maxScroll - 1) {
            const targetScroll = Math.min(currentScroll + lineHeight, maxScroll);
            smoothScrollToSlowly(el, targetScroll, 800);
            activeScrollSession = setTimeout(() => { startSmartScrolling(); }, 2000); 
          }
        } else {
          smoothScrollToSlowly(el, el.scrollHeight, 6000);
        }
      };

      const observer = new MutationObserver(() => {
        if (activeScrollSession) {
          clearTimeout(activeScrollSession);
          activeScrollSession = null;
        }
        if (el.scrollHeight > el.clientHeight) {
          activeScrollSession = setTimeout(() => { startSmartScrolling(); }, 3000);
        } else {
          el.scrollTop = 0;
        }
      });
      observer.observe(el, { childList: true, characterData: true, subtree: true });
    };

    setupSourceScrollBehavior(sourceEl);
    setupTargetScrollBehavior(target1El);
    setupTargetScrollBehavior(target2El);
    setupTargetScrollBehavior(target3El);

    let socket = null;
    let initialConnectionDone = false;

    function applyStyle(el, styleObj) {
      if (!styleObj) return;
      if (styleObj.color) el.style.color = styleObj.color;
      if (styleObj.strokeSize !== undefined && styleObj.strokeColor) {
        el.style.webkitTextStroke = `${styleObj.strokeSize} ${styleObj.strokeColor}`;
      }
      if (styleObj.fontSize) el.style.fontSize = styleObj.fontSize;
    }

    function applyClasses(el, classes) {
      if (!classes) return;
      el.classList.remove('visual-single-line', 'overflow-normal', 'overflow-truncate', 'overflow-shrink');
      classes.forEach(c => el.classList.add(c));
    }

    function connect() {
      if (!initialConnectionDone) {
        sourceEl.textContent = 'Connecting to OBS WebSocket...';
        target1El.textContent = '';
        target2El.textContent = '';
        target3El.textContent = '';
      }

      console.log(`Attempting connection to ${wsUrl}`);
      
      try {
        socket = new WebSocket(wsUrl);
      } catch (err) {
        console.error("Failed to create WebSocket instance:", err);
        sourceEl.textContent = `WebSocket Error: ${err.message}. Blocked by HTTPS Mixed Content?`;
        applyStyle(sourceEl, { color: "#ff0000", strokeColor: "#000000", strokeSize: "2px", fontSize: "24px" });
        return;
      }

      socket.onopen = () => {
        console.log("WebSocket connection opened.");
      };

      socket.onmessage = (event) => {
        let msg;
        try {
          msg = JSON.parse(event.data);
        } catch (e) { return; }

        const op = msg.op;
        const d = msg.d;

        if (op === 0) {
          const auth = d.authentication;
          if (!auth) {
            socket.send(JSON.stringify({ op: 1, d: { rpcVersion: 1, eventSubscriptions: 1 } }));
          } else {
            buildAuthToken(wsPwd, auth.salt, auth.challenge).then(token => {
              socket.send(JSON.stringify({
                op: 1,
                d: { rpcVersion: 1, authentication: token, eventSubscriptions: 1 } 
              }));
            });
          }
        }

        if (op === 2) {
           initialConnectionDone = true;
           console.log("OBS WebSocket authenticated successfully.");
           sourceEl.textContent = ''; // Clear connecting message
        }

        if (op === 5 && d.eventType === 'CustomEvent' && d.eventData && d.eventData.type === 'hamham_subtitle_update') {
          const data = d.eventData;

          // 處理對齊
          if (data.alignment) {
            let flexAlign = 'center';
            if (data.alignment === 'left') flexAlign = 'flex-start';
            if (data.alignment === 'right') flexAlign = 'flex-end';
            document.documentElement.style.setProperty('--text-align', flexAlign);
            document.getElementById('subtitle-container').style.textAlign = data.alignment;
          }

          // 處理 class (排版)
          if (data.layoutClasses) {
             applyClasses(sourceEl, data.layoutClasses.source);
             applyClasses(target1El, data.layoutClasses.targets);
             applyClasses(target2El, data.layoutClasses.targets);
             applyClasses(target3El, data.layoutClasses.targets);
          }

          // 只更新文字，不再重置動畫，避免頻繁閃爍
          const updateText = (el, newText, styleData) => {
            if (el.textContent !== newText) {
              el.textContent = newText || '';
            }
            if (styleData) applyStyle(el, styleData);
          };

          updateText(sourceEl, data.source, data.styles?.source);
          updateText(target1El, data.target1, data.styles?.target1);
          updateText(target2El, data.target2, data.styles?.target2);
          updateText(target3El, data.target3, data.styles?.target3);
        }
      };

      socket.onerror = (err) => {
         console.error("OBS WebSocket connection error", err);
         sourceEl.textContent = `Error connecting to ${wsUrl}. If using GitHub Pages, HTTP/HTTPS mixed content might be blocking it.`;
         applyStyle(sourceEl, { color: "#ffaa00", strokeColor: "#000000", strokeSize: "2px", fontSize: "20px" });
      };

      socket.onclose = (event) => {
        console.log(`WebSocket closed (Code: ${event.code}). Reconnecting in 3s...`);
        if (!initialConnectionDone) {
             sourceEl.textContent = `Connection closed. Retrying...`;
        }
        setTimeout(connect, 3000);
      };
    }

    connect();
  </script>
</body>
</html>
